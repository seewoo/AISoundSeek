<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AudioSeek Insert</title>
  <!-- CSInterface must be loaded before main.js so the CSInterface global is available -->
  <script src="CSInterface.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .status {
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }
    .status.active { color: #4ade80; }
    .status.error { color: #f87171; }
    .status.waiting { color: #fbbf24; }
    h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #fff;
    }
    .port {
      font-family: monospace;
      background: #2a2a4e;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #a5b4fc;
    }
    #message {
      margin-top: 8px;
      font-size: 12px;
      word-break: break-all;
      max-width: 240px;
      text-align: center;
    }
    .track-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      max-width: 240px;
    }
    .track-row label { font-size: 12px; color: #888; white-space: nowrap; }
    .track-row select {
      flex: 1;
      background: #2a2a4e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
    }
    .track-row button {
      background: #2a2a4e;
      color: #a5b4fc;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
    }
    .track-row button:hover { background: #3a3a6e; }
  </style>
</head>
<body>
  <h3>AudioSeek Insert</h3>
  <div class="status waiting" id="status">● 正在启动...</div>
  <p class="status waiting" id="message">等待 AudioSeek 发送音频文件...</p>
  <div class="track-row">
    <label>目标音轨:</label>
    <select id="trackSelect">
      <option value="" disabled>— 请点击 ↺ 刷新 —</option>
    </select>
    <button onclick="refreshTracks()" title="刷新轨道列表">↺</button>
  </div>
  <p style="margin-top: 14px; font-size: 12px; color: #888;">
    监听端口: <span class="port">18432</span>
  </p>
  <!-- main.js must come after CSInterface.js in the head -->
  <script src="main.js"></script>
</body>
</html>
