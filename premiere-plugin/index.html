<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AudioSeek Insert</title>
  <script src="main.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .status {
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }
    .status.active { color: #4ade80; }
    .status.error { color: #f87171; }
    .status.waiting { color: #fbbf24; }
    h3 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #fff;
    }
    .port {
      font-family: monospace;
      background: #2a2a4e;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <h3>AudioSeek Insert</h3>
  <div class="status active" id="status">● 服务已启动</div>
  <p class="status waiting" id="message">等待 AudioSeek 发送音频文件...</p>
  <p style="margin-top: 20px; font-size: 12px; color: #888;">
    监听端口: <span class="port">18432</span>
  </p>
</body>
</html>
